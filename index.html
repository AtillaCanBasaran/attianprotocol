<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATTIAN PROTOCOL</title>

<style>

body {
    background-color: #05010a;
    color: #b58ad8;
    font-family: Consolas, Monaco, monospace;
    max-width: 800px;
    margin: 80px auto;
    padding: 20px;
    line-height: 1.8;
}

h1 {
    color: #c56cff;
    letter-spacing: 6px;
    font-weight: normal;
    text-shadow:
        0 0 4px rgba(197,108,255,0.5),
        0 0 10px rgba(197,108,255,0.25);
}

.status {
    margin-top: 40px;
    color: #6d5b80;
    font-size: 0.9em;
}

.cursor {
    color: #c56cff;
    animation: blink 1.2s infinite;
}

a {
    color: #c56cff;
    text-decoration: none;
}

a:hover {
    text-shadow: 0 0 6px rgba(197,108,255,0.6);
}

hr {
    border: none;
    border-top: 1px solid #2a1838;
    margin: 30px 0;
}

@keyframes blink {
    50% {
        opacity: 0;
    }
}

</style>
</head>

<body>

<h1>ATTIAN PROTOCOL</h1>
    
<p class="dim">/memory_node/attian</p>
<p>MEMORY NODE ACTIVE<span class="cursor">_</span></p>

<hr>

<p>
Connection estabilished.<br>
Archive Status: Operational<br>
Memory Integrity: Unstable but recoverable. <br>

</p>
